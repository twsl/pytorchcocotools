---
name: Benchmark

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Benchmark
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11"]
    runs-on: ["ubuntu-latest"]
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free Disk Space
        uses: twsl/gha-free-disk-space@v1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Install dependencies
        run: uv sync --all-groups --all-extras --frozen

      - name: Download previous benchmark results
        uses: dawidd6/action-download-artifact@v19
        with:
          workflow: benchmark.yaml
          name: benchmark-results-${{ runner.os }}-${{ matrix.python-version }}
          path: .benchmarks
          if_no_artifact_found: warn
          search_artifacts: true

      - name: Run benchmarks
        id: benchmark
        env:
          PYTHONWARNINGS: "ignore:__array__ implementation doesn't accept a copy keyword"
        run: |
          BENCHMARK_ARGS="--benchmark-only --benchmark-save=current --benchmark-storage=.benchmarks"
          if [ -f .benchmarks/*.json ]; then
            BENCHMARK_ARGS="$BENCHMARK_ARGS --benchmark-compare"
          fi
          uv run pytest -c pyproject.toml \
          $BENCHMARK_ARGS \
          | tee benchmark-output.txt

      - name: Prepare benchmark artifacts
        if: ${{ always() }}
        run: |
          # Copy the saved benchmark json to a well-known name for artifact upload
          find .benchmarks -name '*.json' -newer pyproject.toml -exec cp {} benchmark-results.json \; 2>/dev/null || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ runner.os }}-${{ matrix.python-version }}
          path: benchmark-results.json
          overwrite: true
        if: ${{ always() }}

      - name: Post benchmark results to job summary
        run: |
          echo "## Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat benchmark-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Results for commit ${{ github.sha }}." >> "$GITHUB_STEP_SUMMARY"
