name: GPU Tests

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit SHA to test"
        required: false
        type: string
        default: ""
      gpu:
        description: "GPU type (L4, T4, A10G, A100, H100…)"
        required: false
        type: string
        default: "L4"
      test_path:
        description: "Path passed to --test-path"
        required: false
        type: string
        default: "tests/"
      pytest_args:
        description: "Args passed to --pytest-args"
        required: false
        type: string
        default: "-v"
      # python_version:
      #   description: "Python version to test against (e.g. 3.10, 3.11)"
      #   required: false
      #   type: string
      #   default: "3.11"

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  artifacts-name: pytest-output-gpu
  python-version: "3.11"

jobs:
  gpu-tests:
    name: Test on GPU
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'gpu'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref  || github.sha }}

      - name: Set up Python ${{ env.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Install dependencies
        run: uv sync --all-groups --all-extras --frozen

      - name: Run Modal GPU tests
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          MODAL_GPU: ${{ inputs.gpu }}
          PYTHON_VERSION: ${{ env.python-version }}
        run: |
          modal run ./scripts/modal_runner.py --test-path "${{ inputs.test_path }}" --pytest-args "${{ inputs.pytest_args }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.artifacts-name }}
          path: test-outputs/pytest-output.log
          if-no-files-found: warn
          retention-days: 30
        if: ${{ always() }}
